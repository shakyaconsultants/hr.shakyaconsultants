services:
  - type: web
    name: hr-shakya-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set these in Render Dashboard (sync: false = no value in repo)
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: "8h"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "30d"
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AUTH_USE_HTTP_ONLY_COOKIES
        value: "true"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAME_SITE
        value: "none"
      - key: CORS_CREDENTIALS
        value: "true"
      - key: SOCKET_ENABLED
        value: "false"
  - type: web
    name: hr-shakya-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_AUTH_USE_HTTP_ONLY_COOKIES
        value: "true"
